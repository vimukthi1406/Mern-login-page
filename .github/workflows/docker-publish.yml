name: Build and Push Docker Images to DockerHub

on:
  push:
    branches: ["main", "master"] # Triggers when you push to main/master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        # Uses the secrets we will set up in your GitHub repository
        uses: docker/login-action@v2
        with:
          username: lakshan0
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          # Tags the image with your DockerHub username and 'latest'
          tags: lakshan0/mern-auth-backend:latest

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          # Tags the image with your DockerHub username and 'latest'
          tags: lakshan0/mern-auth-frontend:latest
