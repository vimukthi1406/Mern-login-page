version: '3.8'

services:
  # --- Database Service ---
  mongodb:
    image: mongo:latest
    container_name: mern-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  # --- Backend API Service ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mern-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/mern-auth
      - JWT_SECRET=your_super_secret_jwt_key_change_me
      - JWT_EXPIRES_IN=30d
    depends_on:
      - mongodb
    restart: unless-stopped

  # --- Frontend React Web Service ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mern-frontend
    ports:
      - "3000:80" # Maps localhost:3000 to Nginx port 80 inside container
    depends_on:
      - backend
    restart: unless-stopped

# --- Named Volumes ---
volumes:
  mongo-data:
